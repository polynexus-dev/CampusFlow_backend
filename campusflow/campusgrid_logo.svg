<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Vibrant Blue-to-Purple Gradient -->
    <linearGradient id="grid-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" /> <!-- Sky Blue -->
      <stop offset="50%" stop-color="#6366f1" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#a855f7" /> <!-- Purple -->
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&amp;display=swap');
      .brand-title {
        font-family: 'Poppins', 'Segoe UI', Roboto, sans-serif;
        font-weight: 700;
        font-size: 38px;
        fill: #FFFFFF;
        text-anchor: middle;
        letter-spacing: 2px;
      }
      .brand-sub {
        font-family: 'Poppins', 'Segoe UI', Roboto, sans-serif;
        font-weight: 400;
        font-size: 14px;
        fill: #c3cefa;
        text-anchor: middle;
        letter-spacing: 1px;
      }
    </style>
  </defs>

  <!-- 1. The Stylized 'C' + Infinity Logo -->
  <g transform="translate(0, -20)">
    <!-- Stylized 'C' looping into Infinity symbol -->
    <path d="M 330,100 C 270,100 180,130 180,210 C 180,290 270,320 330,320 C 350,320 365,300 365,280 C 365,250 350,240 330,240 C 310,240 295,255 280,270 C 265,285 240,285 225,270 C 210,255 210,230 225,215 C 240,200 265,200 280,215 C 295,230 310,245 330,245 C 350,245 375,230 390,215 C 405,200 405,175 390,160 C 375,145 350,145 330,160 C 310,175 295,190 280,205" 
          fill="none" 
          stroke="url(#grid-grad)" 
          stroke-width="16" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>

  <!-- 2. Typography -->
  <text x="250" y="415" class="brand-title">CAMPUSGRID</text>
  <text x="250" y="445" class="brand-sub">powered by Polynexus</text>
</svg>
