<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&amp;display=swap');
      .cf-title {
        font-family: 'Poppins', 'Segoe UI', Roboto, sans-serif;
        font-weight: 600;
        font-size: 52px;
        text-anchor: middle;
      }
      .cf-sub {
        font-family: 'Poppins', 'Segoe UI', Roboto, sans-serif;
        font-weight: 400;
        font-size: 16px;
        text-anchor: middle;
        fill: #a78bfa;
        letter-spacing: 0.5px;
      }
    </style>
  </defs>

  <!-- 1. Centered Graduation Cap (Nexus Central Hub Style) -->
  <g id="cap-icon">
    <!-- Cap Under-side/Base Outline -->
    <path d="M 210,95 L 210,117 C 210,128 290,128 290,117 L 290,95" fill="none" stroke="#611f69" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" />

    <!-- Tassel String -->
    <path d="M 250,75 L 190,85 L 190,115" fill="none" stroke="#611f69" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Tassel Tip -->
    <path d="M 185,115 L 195,115 L 195,130 C 195,133 185,133 185,130 Z" fill="#611f69" />

    <!-- Outer Cap Board Rhombus -->
    <polygon points="250,40 330,75 250,110 170,75" fill="none" stroke="#611f69" stroke-width="6" stroke-linejoin="round" />

    <!-- Central Nexus Hub (Solid Circle) -->
    <circle cx="250" cy="75" r="9" fill="#611f69" />

    <!-- Connecting Channels with clean negative-space gaps -->
    <line x1="250" y1="40" x2="250" y2="61" stroke="#611f69" stroke-width="4.5" stroke-linecap="round" />
    <line x1="330" y1="75" x2="264" y2="75" stroke="#611f69" stroke-width="4.5" stroke-linecap="round" />
    <line x1="250" y1="110" x2="250" y2="89" stroke="#611f69" stroke-width="4.5" stroke-linecap="round" />
    <line x1="170" y1="75" x2="236" y2="75" stroke="#611f69" stroke-width="4.5" stroke-linecap="round" />
  </g>

  <!-- 2. Centered Typography -->
  <text x="250" y="190" class="cf-title">
    <tspan fill="#611f69">Campus</tspan><tspan fill="#FFFFFF">Nexus</tspan>
  </text>

  <!-- 3. Subtext: "powered by Polynexus" -->
  <text x="250" y="232" class="cf-sub">powered by Polynexus</text>
</svg>
