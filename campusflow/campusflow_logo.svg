<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" width="100%" height="100%">
  <defs>
    <!-- Infinity Loop Gradient matching the theme -->
    <linearGradient id="infinity-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#611f69" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Background (Optional, kept transparent as standard SVG logo) -->

  <!-- 1. Centered Graduation Cap (Outline Style) -->
  <g id="cap-icon">
    <!-- Cap Board (Rhombus Outline) -->
    <polygon points="250,40 330,75 250,110 170,75" fill="none" stroke="#611f69" stroke-width="6" stroke-linejoin="round" />
    
    <!-- Cap Under-side/Base Outline -->
    <path d="M 210,93 L 210,115 C 210,126 290,126 290,115 L 290,93" fill="none" stroke="#611f69" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" />

    <!-- Tassel String -->
    <path d="M 250,75 L 190,85 L 190,115" fill="none" stroke="#611f69" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Tassel Tip -->
    <path d="M 185,115 L 195,115 L 195,130 C 195,133 185,133 185,130 Z" fill="#611f69" />
  </g>

  <!-- 2. Centered Integrated Typography -->
  <!-- "Campus" (Deep Purple) -->
  <text x="101" y="190" font-family="Poppins, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="600" fill="#611f69" letter-spacing="-0.5">Campus</text>

  <!-- "Fl" (White) -->
  <text x="281" y="190" font-family="Poppins, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="600" fill="#FFFFFF" letter-spacing="-0.5">Fl</text>

  <!-- "o" styled as Purple Infinity Loop (∞) -->
  <path d="M 322 177 C 322 168, 334 168, 340 177 C 346 186, 358 186, 358 177 C 358 168, 346 168, 340 177 C 334 186, 322 186, 322 177 Z" 
        fill="none" 
        stroke="url(#infinity-grad)" 
        stroke-width="7.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- "w" (White) -->
  <text x="364" y="190" font-family="Poppins, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="600" fill="#FFFFFF" letter-spacing="-0.5">w</text>

  <!-- 3. Subtext: "powered by Polynexus" -->
  <text x="250" y="232" font-family="Poppins, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="400" fill="#a78bfa" text-anchor="middle" letter-spacing="0.5">powered by Polynexus</text>
</svg>
