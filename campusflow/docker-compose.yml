services:
  web:
    build: .
    ports:
      - "8200:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: /bin/bash ./entrypoint.sh

  db:
    image: postgres:17
    env_file:
      - .env
    volumes:
      - CampusFlow_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - CampusFlow_redis_data:/data

volumes:
  CampusFlow_postgres_data:
  CampusFlow_redis_data:

