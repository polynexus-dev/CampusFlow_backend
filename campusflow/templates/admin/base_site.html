{% extends "admin/base_site.html" %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}" style="font-family: 'Inter', sans-serif; font-weight: 800; letter-spacing: 0.5px; color: #ffffff; display: flex; align-items: center; gap: 8px;">
        <span>CampusNexus</span>
        <span style="font-size: 10px; font-weight: 400; text-transform: uppercase; background: #7C3085; padding: 2px 6px; border-radius: 4px; letter-spacing: 1px;">SaaS Portal</span>
    </a>
</div>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
  :root {
    --primary: #4A154B !important;
    --primary-fg: #ffffff !important;
    --header-color: #ffffff !important;
    --header-bg: #4A154B !important;
    --header-link-color: #ffffff !important;
    --breadcrumbs-bg: #F5EDF6 !important;
    --breadcrumbs-link-color: #4A154B !important;
    --body-bg: #F8FAFC !important;
    --accent: #7C3085 !important;
    --button-bg: #7C3085 !important;
    --button-hover-bg: #63226B !important;
    --link-color: #7C3085 !important;
    --link-hover-color: #4A154B !important;
    
    --message-success-bg: #ECFDF5 !important;
    --message-success-color: #065F46 !important;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
    background-color: #F8FAFC !important;
  }

  #header {
    background: #4A154B !important;
    border-bottom: 3px solid #7C3085 !important;
    padding: 14px 20px !important;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05) !important;
  }

  #header a {
    font-weight: 500 !important;
  }

  #header a:hover {
    color: #F5EDF6 !important;
  }

  .breadcrumbs {
    background: #F5EDF6 !important;
    color: #4A154B !important;
    border-bottom: 1px solid #E2E8F0 !important;
    padding: 8px 20px !important;
    font-size: 13px !important;
    font-weight: 500 !important;
  }

  .breadcrumbs a {
    color: #7C3085 !important;
  }

  .breadcrumbs a:hover {
    color: #4A154B !important;
    text-decoration: underline !important;
  }

  div.breadcrumbs {
    color: #6B7280 !important;
  }

  /* Module table headers and sections */
  .module h2, .module caption, .section h2 {
    background: #7C3085 !important;
    color: #ffffff !important;
    font-weight: 700 !important;
    letter-spacing: 0.3px !important;
    text-transform: uppercase !important;
    font-size: 12px !important;
    padding: 8px 12px !important;
    border-radius: 6px 6px 0 0 !important;
  }

  .module {
    border: 1px solid #E2E8F0 !important;
    border-radius: 8px !important;
    overflow: hidden !important;
    box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05) !important;
    background: #ffffff !important;
    margin-bottom: 20px !important;
  }

  /* Buttons & Action Forms */
  input[type=submit], input[type=button], .button, a.button {
    background: #7C3085 !important;
    border: 1px solid #63226B !important;
    color: #ffffff !important;
    border-radius: 6px !important;
    padding: 6px 14px !important;
    font-weight: 600 !important;
    font-size: 13px !important;
    cursor: pointer !important;
    transition: all 0.15s ease !important;
  }

  input[type=submit]:hover, input[type=button]:hover, .button:hover, a.button:hover {
    background: #63226B !important;
    border-color: #4A154B !important;
    box-shadow: 0 2px 4px 0 rgba(0,0,0,0.08) !important;
  }

  input[type=submit].default, .submit-row input[type=submit].default {
    background: #4A154B !important;
    border-color: #3F0E40 !important;
  }

  input[type=submit].default:hover, .submit-row input[type=submit].default:hover {
    background: #3F0E40 !important;
  }

  /* Django Login Panel Page specific styling */
  .login {
    background: #F1F5F9 !important;
  }

  .login #header {
    background: #4A154B !important;
    display: flex !important;
    justify-content: center !important;
    border-bottom: 4px solid #7C3085 !important;
    padding: 18px !important;
  }

  .login #site-name a {
    font-size: 20px !important;
  }

  .login #content-main {
    margin-top: 40px !important;
    background: #ffffff !important;
    border-radius: 12px !important;
    border: 1px solid #E2E8F0 !important;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.03) !important;
    padding: 24px !important;
    width: 100% !important;
    max-width: 400px !important;
    box-sizing: border-box !important;
  }

  .login #content-main h1 {
    font-family: 'Inter', sans-serif !important;
    font-weight: 800 !important;
    color: #4A154B !important;
    font-size: 18px !important;
    text-transform: uppercase !important;
    letter-spacing: 0.5px !important;
    margin-bottom: 20px !important;
    border-bottom: 2px solid #F1F5F9 !important;
    padding-bottom: 10px !important;
  }

  .login .form-row {
    padding: 10px 0 !important;
    border: none !important;
  }

  .login .form-row label {
    font-size: 13px !important;
    font-weight: 600 !important;
    color: #475569 !important;
    margin-bottom: 6px !important;
  }

  .login .form-row input[type=text], .login .form-row input[type=password] {
    width: 100% !important;
    padding: 8px 12px !important;
    border-radius: 6px !important;
    border: 1px solid #CBD5E1 !important;
    font-size: 14px !important;
    box-sizing: border-box !important;
    transition: border-color 0.15s ease !important;
  }

  .login .form-row input[type=text]:focus, .login .form-row input[type=password]:focus {
    border-color: #7C3085 !important;
    outline: none !important;
    box-shadow: 0 0 0 3px rgba(124, 48, 133, 0.15) !important;
  }

  .login .submit-row {
    padding: 12px 0 0 0 !important;
    background: transparent !important;
    border: none !important;
    text-align: left !important;
  }

  .login .submit-row input[type=submit] {
    width: 100% !important;
    padding: 10px !important;
    font-size: 14px !important;
    text-transform: uppercase !important;
    letter-spacing: 0.5px !important;
    background: #4A154B !important;
    border-color: #3F0E40 !important;
  }

  .login .submit-row input[type=submit]:hover {
    background: #3F0E40 !important;
  }

  /* Django internal admin list filter custom details */
  #changelist-filter {
    border-left: 1px solid #E2E8F0 !important;
    background: #ffffff !important;
  }

  #changelist-filter h2 {
    background: #4A154B !important;
    color: #ffffff !important;
  }

  #changelist-filter a:focus, #changelist-filter a:hover, #changelist-filter li.selected a {
    color: #7C3085 !important;
  }

  .object-tools a {
    background-color: #7C3085 !important;
  }
  .object-tools a:hover {
    background-color: #63226B !important;
  }
</style>
{% endblock %}
